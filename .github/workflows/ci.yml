# =============================================================================
# GitHub Actions：以「整个 RPC 仓库」为根时的 CI
# -----------------------------------------------------------------------------
# 仓库布局（根目录即本文件所在仓库根）：
#   RPC/
#     README.md, autobuild/, .gitmodules
#     rpc/          ← CMake 工程根（muduo 子模块在 rpc/muduo）
#     .github/workflows/ci.yml
#
# 流程要点：
#   1. checkout + submodules:recursive — 拉取 chenshuo/muduo
#   2. apt 安装依赖（与 README 一致，含 libgtest-dev + libflatbuffers-dev）
#   3. 在 rpc/build 全量编译：examples（含 SHM Proto ZC）+ 单元测试
#   4. 运行 lcz_rpc_unit_tests
#   5. SHM 零拷贝路径 smoke test
# =============================================================================

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch: {}

# 同一分支新提交会取消还在跑的旧任务，省 Actions 分钟
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    services:
      etcd:
        image: bitnamilegacy/etcd:3.5
        env:
          ALLOW_NONE_AUTHENTICATION: "yes"
          ETCD_LISTEN_CLIENT_URLS: http://0.0.0.0:2379
          ETCD_ADVERTISE_CLIENT_URLS: http://0.0.0.0:2379
        ports:
          - 2379:2379
        options: --health-cmd="etcdctl endpoint health" --health-interval=5s --health-timeout=3s --health-retries=5

    steps:
      # v6 使用 Node 24 运行时，避免 “Node.js 20 deprecated” 的 Annotation 警告（该警告本身不会导致失败）
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      # muduo 依赖 Boost（CMake: find_package(Boost REQUIRED)），仅装 json/protobuf 不够，缺了会卡在 Configure
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            pkg-config \
            g++ \
            make \
            libboost-dev \
            libjsoncpp-dev \
            libcurl4-openssl-dev \
            protobuf-compiler \
            libprotobuf-dev \
            libflatbuffers-dev \
            flatbuffers-compiler \
            libgtest-dev

      # 提前失败并给出可读提示：仓库根是否含 rpc/、muduo 子模块是否拉下
      - name: Verify repo layout and muduo submodule
        run: |
          if [ ! -f rpc/CMakeLists.txt ]; then
            echo "::error title=路径不对::仓库根下没有 rpc/CMakeLists.txt。若 GitHub 上只有 rpc 目录内容、没有外层 rpc 文件夹，请把 ci.yml 里的 working-directory: rpc 改为在仓库根执行 cmake。"
            exit 1
          fi
          if [ ! -f rpc/muduo/CMakeLists.txt ]; then
            echo "::error title=子模块未拉取::缺少 rpc/muduo。请确认已推送 .gitmodules，且 checkout 使用 submodules: recursive。"
            exit 1
          fi

      # CMake 工程在子目录 rpc/（不是仓库根）
      - name: Configure CMake
        working-directory: rpc
        run: |
          mkdir -p build
          cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DLCZ_RPC_BUILD_TESTS=ON \
            -DLCZ_RPC_BUILD_EXAMPLES=ON

      # 全量编译：muduo + proto + 所有 example + 单元测试
      - name: Build entire RPC project
        working-directory: rpc/build
        run: cmake --build . -j$(nproc)

      - name: Run unit tests
        working-directory: rpc/build
        env:
          LCZ_ETCD: http://localhost:2379
        run: ./bin/lcz_rpc_unit_tests

      # SHM 零拷贝路径 smoke test：服务端启动 → 客户端发 3 个 add 请求 → 全部成功
      - name: SHM zero-copy smoke test
        working-directory: rpc/build
        run: |
          rm -f /dev/shm/lcz_shm_proto* lcz_shm_proto_notify
          ./bin/shm_proto_server &
          SERVER_PID=$!
          sleep 1
          timeout 15 ./bin/shm_proto_client 2>&1 | tee /tmp/shm_smoke.log
          kill $SERVER_PID 2>/dev/null || true
          wait $SERVER_PID 2>/dev/null || true
          if grep -q "完成" /tmp/shm_smoke.log; then
            echo "SHM zero-copy smoke test PASSED"
          else
            echo "::error title=SHM smoke test failed::客户端未完成全部 3 次请求"
            exit 1
          fi

  # 验证仓库根 Dockerfile 能构建（与上面并行，不推镜像到仓库）
  docker-image:
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Build Docker image
        run: docker build -t lcz-rpc:ci .
